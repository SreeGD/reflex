apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: payment-service
  name: payment-service
  namespace: shopfast-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - env:
        - name: DATABASE_URL
          value: postgresql://payment_user@shopfast-db.shopfast-prod.svc.cluster.local:5432/shopfast_payments
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq.shopfast-prod.svc.cluster.local:5672
        - name: PAYMENT_GATEWAY_URL
          value: https://api.stripe.com/v1
        - name: DB_POOL_MAX
          value: '15'
        - name: JVM_HEAP_MAX
          value: 2048m
        - name: LOG_LEVEL
          value: info
        envFrom:
        - configMapRef:
            name: payment-service-config
        image: shopfast/payment-service:2.0.4
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
          periodSeconds: 10
        name: payment-service
        ports:
        - containerPort: 8084
        readinessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 1000m
            memory: 2048Mi
          requests:
            cpu: 300m
            memory: 512Mi
