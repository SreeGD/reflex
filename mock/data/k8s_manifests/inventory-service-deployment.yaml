apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: inventory-service
  name: inventory-service
  namespace: shopfast-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - env:
        - name: DATABASE_URL
          value: postgresql://inventory_user@shopfast-db.shopfast-prod.svc.cluster.local:5432/shopfast_inventory
        - name: DB_POOL_MAX
          value: '15'
        - name: LOG_LEVEL
          value: info
        envFrom:
        - configMapRef:
            name: inventory-service-config
        image: shopfast/inventory-service:1.5.3
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
        name: inventory-service
        ports:
        - containerPort: 8086
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
