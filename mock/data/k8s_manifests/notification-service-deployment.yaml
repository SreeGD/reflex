apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: notification-service
  name: notification-service
  namespace: shopfast-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - env:
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq.shopfast-prod.svc.cluster.local:5672
        - name: SMTP_HOST
          value: ses.us-east-1.amazonaws.com
        - name: LOG_LEVEL
          value: info
        envFrom:
        - configMapRef:
            name: notification-service-config
        image: shopfast/notification-service:1.2.0
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 10
        name: notification-service
        ports:
        - containerPort: 8085
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
