apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cart-service
  name: cart-service
  namespace: shopfast-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - env:
        - name: CATALOG_SERVICE_URL
          value: http://catalog-service:8081
        - name: REDIS_HOST
          value: redis.shopfast-prod.svc.cluster.local
        - name: REDIS_PORT
          value: '6379'
        - name: REDIS_POOL_MAX
          value: '50'
        - name: LOG_LEVEL
          value: info
        envFrom:
        - configMapRef:
            name: cart-service-config
        image: shopfast/cart-service:1.8.1
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        name: cart-service
        ports:
        - containerPort: 8082
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
