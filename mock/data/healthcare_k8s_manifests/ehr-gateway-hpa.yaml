apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ehr-gateway-hpa
  namespace: medflow-prod
spec:
  maxReplicas: 10
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ehr-gateway
